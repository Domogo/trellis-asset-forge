name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"
      - run: uv sync --locked --all-groups
      - run: uv run ruff check .
      - run: uv run mypy src
      - run: uv run pytest --cov=trellis_asset_forge
      - run: uv build
